<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>B2B 计划与作业单</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body{max-width:1000px;margin:16px auto;}
    .quadrant{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
    @media(max-width:700px){.quadrant{grid-template-columns:1fr;}}
    .q-card{border:1px solid #ddd;border-radius:14px;padding:12px;background:#fff;min-height:120px;}
    .q-title{font-size:15px;font-weight:800;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
    .q-title .count{font-size:12px;color:#666;font-weight:400;}
    .q-empty{color:#999;font-size:13px;padding:10px 0;}
    .plan-row{border-bottom:1px solid #f0f0f0;padding:8px 0;font-size:13px;}
    .plan-row:last-child{border-bottom:none;}
    .plan-row .meta{color:#666;font-size:12px;margin-top:2px;}
    .st{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;color:#fff;margin-right:4px;}
    .st-pending{background:#999;} .st-arrived{background:#3498db;} .st-processing{background:#e67e22;}
    .st-completed{background:#27ae60;} .st-abnormal{background:#e74c3c;} .st-cancelled{background:#bbb;}
    .st-draft{background:#999;} .st-issued{background:#3498db;} .st-working{background:#e67e22;} .st-recording{background:#e67e22;}
    .bound-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;color:#fff;background:#8e24aa;margin-left:4px;}
    .status-btns{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
    .status-btns button{padding:4px 10px;font-size:11px;margin:0;width:auto;min-width:0;border-radius:8px;}
    .wo-row{border-bottom:1px solid #f0f0f0;padding:8px 0;font-size:13px;cursor:pointer;}
    .wo-row:last-child{border-bottom:none;}
    .wo-row:hover{background:#f9f9f9;}
    .wo-row .meta{color:#666;font-size:12px;margin-top:2px;}
    .form-group{margin-bottom:12px;}
    .form-group label{display:block;font-size:13px;font-weight:700;margin-bottom:4px;}
    .form-group select,.form-group input,.form-group textarea{width:100%;box-sizing:border-box;}
    .line-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;}
    .line-table th,.line-table td{border:1px solid #ddd;padding:6px 8px;text-align:left;}
    .line-table th{background:#f5f5f5;font-weight:700;}
    .line-table input{padding:4px;font-size:13px;width:100%;box-sizing:border-box;border:1px solid #ddd;border-radius:4px;}
    .topnav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
    .topnav button{width:auto;min-width:0;padding:10px 16px;}
    .detail-field{margin-bottom:6px;font-size:13px;}
    .detail-field b{font-weight:700;}
    .row-dim{opacity:0.45;}
    .edit-id-bar{background:#f0f5ff;border:1px solid #b3d4fc;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:14px;font-weight:700;color:#1a5276;}
    .q-clickable{cursor:pointer;transition:box-shadow .15s;}
    .q-clickable:hover{box-shadow:0 2px 8px rgba(0,0,0,.12);}
    .card-status-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px;}
    .overdue-warn{background:#fff3e0;color:#e65100;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;margin-top:8px;cursor:pointer;}
    .overdue-warn:hover{background:#ffe0b2;}
    .att-section{border:1px solid #e0e0e0;border-radius:10px;padding:12px;margin:12px 0;background:#fafafa;}
    .att-title{font-size:14px;font-weight:700;margin-bottom:8px;}
    .att-grid{display:flex;flex-wrap:wrap;gap:10px;}
    .att-item{border:1px solid #ddd;border-radius:8px;padding:6px;background:#fff;width:130px;text-align:center;}
    .att-thumb{width:118px;height:90px;object-fit:cover;border-radius:4px;cursor:pointer;}
    .att-fname{font-size:11px;color:#333;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .att-time{font-size:10px;color:#999;}
    .att-del{font-size:11px;color:#e74c3c;cursor:pointer;margin-top:2px;background:none;border:none;padding:0;}
    .att-del:hover{text-decoration:underline;}
    .att-upload-btn{width:118px;height:90px;border:2px dashed #bbb;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;font-size:13px;background:#fff;}
    .att-upload-btn:hover{border-color:#666;color:#333;}
    .att-msg{font-size:12px;margin-top:6px;}
    .lightbox-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer;}
    .lightbox-overlay img{max-width:92vw;max-height:92vh;border-radius:4px;}
    .list-section-title{font-size:14px;font-weight:700;padding:8px 0 4px;border-bottom:2px solid #eee;margin-bottom:4px;}
    .overdue-section-title{color:#e65100;}
    @media print{.no-print{display:none !important;} body{margin:0;}}
  </style>
</head>
<body>

<div class="header no-print">
  <div>
    <div class="title">B2B 计划与作业单</div>
    <div class="subtitle">入库计划 · 出库作业单 · 制单管理</div>
  </div>
  <div class="pill" id="todayPill">--</div>
</div>

<!-- 登录 -->
<div id="v-login" class="card">
  <div style="font-size:16px;font-weight:700;margin-bottom:8px;">请输入口令</div>
  <div class="muted" style="margin-bottom:10px;">输入口令后可查看计划、新建作业单、更新状态。</div>
  <div class="row">
    <div><input id="loginKey" type="password" placeholder="口令" /></div>
    <div style="display:flex;align-items:flex-end;">
      <button class="primary" style="width:auto;min-width:120px;" onclick="doLogin()">进入</button>
    </div>
  </div>
  <div id="loginErr" class="bad" style="font-size:13px;margin-top:6px;"></div>
</div>

<!-- 主内容（登录后显示） -->
<div id="v-main" style="display:none;">

  <!-- 导航 -->
  <div class="topnav no-print">
    <button class="primary" onclick="goHome()">首页</button>
    <button onclick="goNewPlan()">+ 入库计划</button>
    <button onclick="goNewWo()">+ 出库作业单</button>
    <button onclick="goNewFo()">+ 现场记录</button>
    <button onclick="goCardDetail('plan','today')">计划列表</button>
    <button onclick="goView('wo_list')">作业单列表</button>
    <button onclick="goView('fo_list')">记录列表</button>
    <button style="margin-left:auto;" onclick="doLogout()">退出</button>
  </div>

  <!-- 首页 -->
  <div id="v-home">
    <div class="quadrant">
      <div class="q-card q-clickable" onclick="goCardDetail('plan','today')">
        <div class="q-title">📥 今日入库计划 <span class="count" id="ip-today-count">--</span></div>
        <div id="ip-today-body"><div class="q-empty">加载中...</div></div>
      </div>
      <div class="q-card q-clickable" onclick="goCardDetail('plan','tomorrow')">
        <div class="q-title">📥 明日入库计划 <span class="count" id="ip-tmr-count">--</span></div>
        <div id="ip-tmr-body"><div class="q-empty">加载中...</div></div>
      </div>
      <div class="q-card q-clickable" onclick="goCardDetail('wo','today')">
        <div class="q-title">📦 今日出库作业单 <span class="count" id="wo-today-count">--</span></div>
        <div id="wo-today-body"><div class="q-empty">加载中...</div></div>
      </div>
      <div class="q-card q-clickable" onclick="goCardDetail('wo','tomorrow')">
        <div class="q-title">📦 明日出库作业单 <span class="count" id="wo-tmr-count">--</span></div>
        <div id="wo-tmr-body"><div class="q-empty">加载中...</div></div>
      </div>
    </div>
  </div>

  <!-- 新建/编辑入库计划 -->
  <div id="v-plan_create" style="display:none;">
    <div class="card">
      <div id="pc-title" style="font-size:16px;font-weight:700;margin-bottom:10px;">新建入库计划</div>
      <div id="pc-id-bar" class="edit-id-bar" style="display:none;"></div>
      <div class="form-group"><label>计划到货日</label><input id="pc-day" type="date" /></div>
      <div class="form-group"><label>客户名</label><input id="pc-customer" placeholder="客户名称" /></div>
      <div class="form-group">
        <label>业务类型</label>
        <select id="pc-biz">
          <option value="b2c_inbound">B2C 入库</option>
          <option value="b2b_inbound">B2B 入库</option>
          <option value="direct_transfer">直接转发</option>
          <option value="other">其他</option>
        </select>
      </div>
      <div class="form-group"><label>货物摘要</label><input id="pc-summary" placeholder="如：服装 200箱" /></div>
      <div class="form-group"><label>预计到达时间</label><input id="pc-arrival" placeholder="如：上午 / 14:00（选填）" /></div>
      <div class="form-group"><label>用途说明</label><input id="pc-purpose" placeholder="如：入库上架 / 直接转发至XX（选填）" /></div>
      <div class="form-group"><label>备注</label><textarea id="pc-remark" rows="2" placeholder="选填"></textarea></div>
      <div id="pc-creator-group" class="form-group"><label>创建人</label><input id="pc-creator" placeholder="你的名字" /></div>
      <button id="pc-submit-btn" class="primary" onclick="submitPlan()">保存</button>
      <div id="pc-result" style="margin-top:8px;font-size:13px;"></div>
    </div>
  </div>

  <!-- 新建/编辑出库作业单 -->
  <div id="v-wo_create" style="display:none;">
    <div class="card">
      <div id="wc-title" style="font-size:16px;font-weight:700;margin-bottom:10px;">新建出库作业单</div>
      <div id="wc-id-bar" class="edit-id-bar" style="display:none;"></div>
      <div class="row">
        <div class="form-group"><label>明细结构</label>
          <select id="wc-detail-mode" onchange="wcDetailModeChanged()">
            <option value="sku_based">按 SKU / 产品</option>
            <option value="carton_based">按 箱</option>
          </select>
        </div>
        <div class="form-group"><label>计划出库日</label><input id="wc-day" type="date" /></div>
      </div>
      <div class="row">
        <div class="form-group"><label>操作模式</label>
          <select id="wc-op-mode">
            <option value="">（选填）</option>
            <option value="箱子操作">箱子操作</option>
            <option value="打托">打托</option>
            <option value="整进整出">整进整出</option>
          </select>
        </div>
        <div class="form-group"><label>出库模式</label>
          <select id="wc-ob-mode">
            <option value="">（选填）</option>
            <option value="仓库叫车">仓库叫车</option>
            <option value="客户自提">客户自提</option>
            <option value="牛奶快递">牛奶快递</option>
            <option value="牛奶托盘">牛奶托盘</option>
            <option value="柜子提货">柜子提货</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="form-group"><label>客户名</label><input id="wc-customer" placeholder="客户名称" /></div>
        <div class="form-group"><label>出库目的地（选填）</label><input id="wc-destination" placeholder="如：首尔仓 / 客户地址" /></div>
      </div>
      <div class="row">
        <div class="form-group"><label>발주번호（选填）</label><input id="wc-order-ref" placeholder="如：PO-2026-001" /></div>
        <div class="form-group"><label>WMS 工单号（选填）</label><input id="wc-ext-no" placeholder="WMS 系统工单号" /></div>
      </div>
      <div class="row">
        <div class="form-group"><label>出库箱数（选填）</label><input id="wc-box-count" type="number" min="0" step="0.5" placeholder="0" /></div>
        <div class="form-group"><label>出库托盘数（选填）</label><input id="wc-pallet-count" type="number" min="0" step="0.5" placeholder="0" /></div>
      </div>
      <div class="form-group"><label>作业指示（选填）</label><textarea id="wc-instr" rows="2" placeholder="如：需要打托 / 轻拿轻放"></textarea></div>
      <div id="wc-creator-group" class="form-group"><label>创建人</label><input id="wc-creator" placeholder="你的名字" /></div>

      <div style="font-size:14px;font-weight:700;margin:12px 0 6px;">明细行</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;">
        <button style="width:auto;padding:6px 14px;font-size:12px;" onclick="wcDownloadTemplate()">下载模板</button>
        <button style="width:auto;padding:6px 14px;font-size:12px;" onclick="document.getElementById('wc-import-file').click()">导入 Excel</button>
        <input type="file" id="wc-import-file" accept=".xlsx,.xls" style="display:none;" onchange="wcImportExcel(this)" />
      </div>
      <div id="wc-import-err" style="font-size:13px;margin-bottom:6px;"></div>
      <div style="overflow-x:auto;">
        <table class="line-table" id="wc-lines-table">
          <thead id="wc-lines-head"></thead>
          <tbody id="wc-lines-body"></tbody>
        </table>
      </div>
      <button style="width:auto;padding:6px 14px;font-size:12px;margin-top:6px;" onclick="wcAddLine()">+ 添加一行</button>
      <div id="wc-summary" class="muted" style="margin-top:8px;font-size:13px;"></div>

      <button id="wc-submit-btn" class="primary" style="margin-top:12px;" onclick="submitWo()">保存（草稿）</button>
      <div id="wc-result" style="margin-top:8px;font-size:13px;"></div>
    </div>
  </div>

  <!-- 入库计划列表 -->
  <div id="v-plan_list" style="display:none;">
    <div class="card">
      <div id="pl-title" style="font-size:16px;font-weight:700;margin-bottom:10px;">入库计划列表</div>
      <div id="pl-result"></div>
    </div>
  </div>

  <!-- 作业单列表 -->
  <div id="v-wo_list" style="display:none;">
    <div class="card">
      <div id="wl-title" style="font-size:16px;font-weight:700;margin-bottom:10px;">出库作业单列表</div>
      <div class="row">
        <div class="form-group"><label>开始日期</label><input id="wl-start" type="date" /></div>
        <div class="form-group"><label>结束日期</label><input id="wl-end" type="date" /></div>
        <div style="display:flex;align-items:flex-end;">
          <button class="primary" style="width:auto;min-width:80px;" onclick="loadWoList()">查询</button>
        </div>
      </div>
      <div id="wl-result" style="margin-top:10px;"></div>
    </div>
  </div>

  <!-- 作业单详情 -->
  <div id="v-wo_detail" style="display:none;">
    <div class="card" id="wo-detail-card"></div>
  </div>

  <!-- 新建/编辑现场作业记录 -->
  <div id="v-fo_create" style="display:none;">
    <div class="card">
      <div id="fo-title" style="font-size:16px;font-weight:700;margin-bottom:10px;">新建现场作业记录</div>
      <div id="fo-id-bar" class="edit-id-bar" style="display:none;"></div>
      <div id="fo-src-bar" style="display:none;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:13px;color:#2e7d32;"></div>
      <div class="row">
        <div class="form-group"><label>作业日期</label><input id="fo-day" type="date" /></div>
        <div class="form-group"><label>操作类型</label>
          <select id="fo-optype">
            <option value="box_op">箱子操作</option>
            <option value="palletize">打托</option>
            <option value="bulk_in_out">整进整出</option>
            <option value="unload">卸货</option>
            <option value="other">其他</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="form-group"><label>客户名</label><input id="fo-customer" placeholder="客户名称" /></div>
        <div class="form-group"><label>货物摘要</label><input id="fo-summary" placeholder="如：服装 300箱" /></div>
      </div>
      <div class="row">
        <div class="form-group"><label>输入箱数</label><input id="fo-input-box" type="number" min="0" step="1" placeholder="0" /></div>
        <div class="form-group"><label>产出箱数</label><input id="fo-output-box" type="number" min="0" step="1" placeholder="0" /></div>
        <div class="form-group"><label>产出托盘数</label><input id="fo-output-pallet" type="number" min="0" step="0.5" placeholder="0" /></div>
      </div>
      <div class="form-group"><label>作业说明（选填）</label><textarea id="fo-instr" rows="2" placeholder="现场操作说明"></textarea></div>
      <div id="fo-creator-group" class="form-group"><label>创建人</label><input id="fo-creator" placeholder="你的名字" /></div>
      <button id="fo-submit-btn" class="primary" onclick="submitFo()">保存</button>
      <div id="fo-result" style="margin-top:8px;font-size:13px;"></div>
    </div>
  </div>

  <!-- 现场作业记录列表 -->
  <div id="v-fo_list" style="display:none;">
    <div class="card">
      <div id="fl-title" style="font-size:16px;font-weight:700;margin-bottom:10px;">现场作业记录列表</div>
      <div class="row">
        <div class="form-group"><label>开始日期</label><input id="fl-start" type="date" /></div>
        <div class="form-group"><label>结束日期</label><input id="fl-end" type="date" /></div>
        <div style="display:flex;align-items:flex-end;">
          <button class="primary" style="width:auto;min-width:80px;" onclick="loadFoList()">查询</button>
        </div>
      </div>
      <div id="fl-result" style="margin-top:10px;"></div>
    </div>
  </div>

  <!-- 现场作业记录详情 -->
  <div id="v-fo_detail" style="display:none;">
    <div class="card" id="fo-detail-card"></div>
  </div>

</div><!-- /v-main -->

<script src="./xlsx.min.js"></script>
<script src="./qrcode.min.js"></script>
<script src="./b2b.js"></script>
</body>
</html>
